<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>แจ้งซ่อมเทศบาล</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body { font-family: 'Kanit', sans-serif; }
  </style>
</head>

<body class="bg-blue-50 min-h-screen">
  <div class="container mx-auto px-4 py-8 max-w-md">
    <div class="bg-white rounded-xl shadow-lg p-6">
      <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">📝 แจ้งซ่อมออนไลน์</h2>

      <form id="repairForm" class="space-y-4">
        <input type="hidden" id="userId" name="userId">

        <div class="bg-yellow-50 p-3 rounded-lg border border-yellow-200 shadow-sm">
          <label class="block text-gray-700 font-bold mb-2">📢 แจ้งเรื่องเกี่ยวกับอะไร? *</label>
          <select name="category" id="category" required
            class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white text-lg">
            <option value="" disabled selected>-- เลือกหัวข้อ --</option>
            <option value="ไฟฟ้าสาธารณะ">💡 ไฟฟ้าสาธารณะ (ไฟดับ/กิ่งไม้)</option>
            <option value="ประปา/ท่อระบายน้ำ">🚰 ประปา / ท่อระบายน้ำ</option>
            <option value="ถนน/ทางเท้า">🛣️ ถนน / ทางเท้าชำรุด</option>
            <option value="ขยะ/ความสะอาด">🗑️ ขยะ / ความสะอาด</option>
            <option value="อื่นๆ">📝 อื่นๆ</option>
          </select>
        </div>

        <div>
          <label class="block text-gray-700 font-bold mb-2">ชื่อผู้แจ้ง *</label>
          <input type="text" name="name" id="name" required
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="ชื่อ-นามสกุล">
        </div>

        <div>
          <label class="block text-gray-700 font-bold mb-2">เบอร์โทรศัพท์ *</label>
          <input type="tel" name="phone" id="phone" required maxlength="10"
            oninput="this.value = this.value.replace(/[^0-9]/g, '')"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="เบอร์โทรศัพท์">
        </div>

        <div>
          <label class="block text-gray-700 font-bold mb-2">รายละเอียด *</label>
          <textarea name="detail" id="detail" rows="2" required
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="แจ้งปัญหาที่พบ"></textarea>
        </div>

        <div>
          <label class="block text-gray-700 font-bold mb-2">รูปถ่ายหน้างาน *</label>
          <div class="flex items-center justify-center w-full">
            <label class="flex flex-col w-full h-24 border-4 border-blue-200 border-dashed hover:bg-gray-100 rounded-lg cursor-pointer bg-blue-50 transition">
              <div class="flex flex-col items-center justify-center pt-5">
                <p class="text-sm font-semibold text-blue-600">📸 กดเพื่อถ่ายรูป (ระบุพิกัดอัตโนมัติ)</p>
              </div>
              <input type="file" name="image" id="imageInput" class="hidden" accept="image/*" capture="environment"
                onchange="previewImage(event)" required>
              <input type="hidden" name="photoUrl" id="photoUrl">
            </label>
          </div>
          <img id="preview" class="hidden w-full h-48 object-cover mt-2 rounded-lg shadow-md" />
        </div>

        <div class="pt-2">
            <button type="button" onclick="getLocation()" id="btnLocation"
                    class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg flex justify-center items-center gap-2 transition shadow-sm">
                🎯 ดึงพิกัด GPS ปัจจุบัน
            </button>
            <p id="locationStatus" class="text-sm text-gray-500 mt-2 text-center font-semibold">ยังไม่ได้ดึงพิกัด (ดึงอัตโนมัติหลังถ่ายรูป)</p>
            <input type="hidden" name="lat" id="lat">
            <input type="hidden" name="long" id="long">
        </div>

        <button type="submit" id="submitBtn"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg mt-4 text-lg transition transform hover:scale-105">
          🚀 ส่งแจ้งซ่อม
        </button>
      </form>
    </div>
    <p class="text-center text-gray-500 text-xs mt-6 mb-10">ระบบแจ้งซ่อมเทศบาล by Alieninburi</p>
  </div>

  <div id="loading" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-[10000]">
    <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500"></div>
  </div>

  <script>
    const WEBHOOK_URL = 'https://hook.eu1.make.com/8uj45pto8ouoba79ndgs8urhwork3ame';
    const IMGBB_API_KEY = '90bdd186ac4a75a080d137e88c123b84';

    window.onload = function() {
      initializeLiff();
      autoSelectCategory();
    };

    // 🌟 ดึง GPS อัตโนมัติทันทีที่ถ่ายรูปเสร็จ
    function previewImage(event) {
        const file = event.target.files[0];
        if(file){
            const reader = new FileReader();
            reader.onload = function(e){
                const output = document.getElementById('preview');
                output.src = e.target.result;
                output.classList.remove('hidden');
                
                // ถ่ายรูปเสร็จปุ๊บ สั่งหาพิกัดปั๊บ
                getLocation();
            }
            reader.readAsDataURL(file);
        }
    }

    // 📍 ฟังก์ชันดึงตำแหน่ง GPS
    function getLocation() {
        const status = document.getElementById('locationStatus');
        
        if (navigator.geolocation) {
            status.innerHTML = "⏳ กำลังดึงพิกัด GPS...";
            status.className = "text-sm text-yellow-600 mt-2 text-center font-bold";
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude.toFixed(6);
                    const lng = position.coords.longitude.toFixed(6);
                    
                    // บันทึกค่าลง Input ซ่อน
                    document.getElementById('lat').value = lat;
                    document.getElementById('long').value = lng;
                    
                    // โชว์ข้อความสำเร็จ
                    status.innerHTML = `✅ ได้พิกัดแล้ว: ${lat}, ${lng}`;
                    status.className = "text-sm text-green-600 mt-2 text-center font-bold";
                }, 
                (error) => {
                    status.innerHTML = "❌ ดึงพิกัดไม่สำเร็จ กรุณาเปิด GPS";
                    status.className = "text-sm text-red-600 mt-2 text-center font-bold";
                    Swal.fire('ข้อผิดพลาด', 'ดึงตำแหน่งไม่สำเร็จ กรุณาเปิด GPS และอนุญาตให้เว็บเข้าถึงตำแหน่ง', 'error');
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        } else {
            status.innerHTML = "❌ อุปกรณ์ไม่รองรับ GPS";
        }
    }

    async function initializeLiff() {
      try {
        await liff.init({ liffId: "2009072405-2lzKZtgB" });
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          document.getElementById('userId').value = profile.userId;
        } else { liff.login(); }
      } catch (err) { console.error(err); }
    }

    function autoSelectCategory() {
      const urlParams = new URLSearchParams(window.location.search);
      const type = urlParams.get('type');
      if(type) {
        const dropdown = document.getElementById('category');
        const mapType = {'electric':'ไฟฟ้าสาธารณะ','water':'ประปา/ท่อระบายน้ำ','road':'ถนน/ทางเท้า','trash':'ขยะ/ความสะอาด','other':'อื่นๆ'};
        if(mapType[type]) dropdown.value = mapType[type];
      }
    }

    // 🚀 ส่งข้อมูล (แก้ไขระบบเรียงลำดับการโหลดภาพใหม่ ป้องกันข้อมูลส่งไปแบบว่างเปล่า)
    document.getElementById('repairForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      
      const lat = document.getElementById('lat').value;
      if (!lat) { Swal.fire('ลืมดึงพิกัด', 'กรุณารอระบบดึงพิกัด หรือกดปุ่มดึงพิกัดด้วยตัวเองก่อนครับ', 'warning'); return; }

      const phone = document.getElementById('phone').value;
      if(phone.length < 9) { Swal.fire('เบอร์โทรไม่ครบ', 'กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง (9-10 หลัก)', 'warning'); return; }

      // ✅ 1. เพิ่มการเช็กรูปภาพตรงนี้
      const imageInput = document.getElementById('imageInput');
      if(imageInput.files.length === 0){ Swal.fire('ลืมรูป', 'กรุณาถ่ายรูปหน้างานด้วยครับ 📸', 'warning'); return; }

      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('submitBtn').disabled = true;

      try {
        const formData = new FormData(this);

        // ✅ 2. แยกการประมวลผลไฟล์รูปให้เสร็จก่อนแบบชัวร์ๆ
        const file = imageInput.files[0];
        const base64 = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(String(reader.result).split(',')[1]);
            reader.onerror = error => reject(error);
            reader.readAsDataURL(file);
        });

        // ✅ 3. อัปโหลดเข้า ImgBB
        const fdImg = new FormData();
        fdImg.append('image', base64);
        const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { 
            method: 'POST', 
            body: fdImg 
        });
        const imgData = await imgRes.json();
        
        if (!imgData || !imgData.success) throw new Error('ImgBB Upload Failed');
        const photoUrl = imgData.data.url;

        // ✅ 4. นำ URL สลับที่กับไฟล์ภาพ และยิงเข้า Make
        formData.set('photoUrl', photoUrl);
        formData.delete('image');

        const res = await fetch(WEBHOOK_URL, { 
            method: 'POST', 
            body: formData 
        });
        
        if (res.ok) {
          Swal.fire('สำเร็จ', 'ส่งเรื่องเรียบร้อย', 'success').then(() => liff.closeWindow());
        } else { 
          throw new Error('Webhook Error'); 
        }

      } catch (error) {
        console.error(error);
        Swal.fire('เกิดข้อผิดพลาด', 'ส่งข้อมูลไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'error');
      } finally {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('submitBtn').disabled = false;
      }
    });
  </script>
</body>
</html>
